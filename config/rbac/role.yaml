---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - delete
  - get
  - list
  - watch
- apiGroups:
  - batch.curiousdevscorner.org
  resources:
  - jobdeletors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch.curiousdevscorner.org
  resources:
  - jobdeletors/finalizers
  verbs:
  - update
- apiGroups:
  - batch.curiousdevscorner.org
  resources:
  - jobdeletors/status
  verbs:
  - get
  - patch
  - update
