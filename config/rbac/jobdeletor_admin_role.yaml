# This rule is not used by the project jobdeletor-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over batch.curiousdevscorner.org.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: jobdeletor-operator
    app.kubernetes.io/managed-by: kustomize
  name: jobdeletor-admin-role
rules:
- apiGroups:
  - batch.curiousdevscorner.org
  resources:
  - jobdeletors
  verbs:
  - '*'
- apiGroups:
  - batch.curiousdevscorner.org
  resources:
  - jobdeletors/status
  verbs:
  - get
